plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'com.stock'
version = '1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

wrapper {
    gradleVersion = '8.11'
}

repositories {
    mavenCentral()
}

javafx {
    version = '21.0.5'
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.graphics']
}

dependencies {
    // Local deps
    implementation fileTree(dir: 'Deps/sqlite', include: '*.jar')
    implementation fileTree(dir: 'Deps/jackson', include: '*.jar')
    implementation fileTree(dir: 'Deps/commons-csv', include: '*.jar')
}

sourceSets {
    main {
        java {
            srcDirs = ['Server', 'client']
        }
        resources {
            srcDirs = ['client/Assets']
        }
    }
}

application {
    mainClass = 'client'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}
